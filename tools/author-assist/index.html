<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Author Assist</title>
  <style>
    :root {
      --border: #dcdcdc;
      --primary: #1d3ecf;
      --bg: #f8f8f8;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: #202124;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px;
    }

    .page {
      width: min(900px, 100%);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 10px 30px -20px rgb(0 0 0 / 25%);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 26px;
    }

    p.subtitle {
      margin: 0;
      color: #555;
    }

    form {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-weight: 600;
      color: #111;
    }

    input, select, textarea, button {
      font: inherit;
    }

    input[type="text"],
    select,
    textarea {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      background: #fff;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .full-row {
      grid-column: 1 / -1;
    }

    .actions {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 12px;
      grid-column: 1 / -1;
    }

    button {
      padding: 10px 18px;
      background: var(--primary);
      border: 1px solid var(--primary);
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    pre {
      background: #111;
      color: #e9f3ff;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 0;
      font-size: 14px;
    }

    .status {
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <h1>Author Assist</h1>
      <p class="subtitle">Mocked helper for crafting page updates—no external API calls.</p>
    </header>

    <form id="assist-form">
      <label class="full-row">
        Preview URL
        <input id="preview-url" type="text" name="preview" placeholder="https://main--edge-space--andy-lambert.aem.live/path" required>
      </label>

      <label>
        Intent
        <select id="intent" name="intent">
          <option value="summarize">Summarize content</option>
          <option value="rewrite">Rewrite for clarity</option>
          <option value="seo">Improve SEO</option>
          <option value="cta">Strengthen CTA</option>
        </select>
      </label>

      <label>
        Tone
        <select id="tone" name="tone">
          <option value="neutral">Neutral</option>
          <option value="friendly">Friendly</option>
          <option value="concise">Concise</option>
          <option value="formal">Formal</option>
        </select>
      </label>

      <label class="full-row">
        Constraints
        <textarea id="constraints" name="constraints" placeholder="Word limits, must-keep phrases, target audience, etc."></textarea>
      </label>

      <div class="actions">
        <button type="submit" id="run-btn">Run</button>
        <span class="status" id="status"></span>
      </div>
    </form>

    <section>
      <h2>Output</h2>
      <pre id="output">No run yet. Provide inputs and click Run.</pre>
    </section>
  </main>

  <script type="module" src="./index.js"></script>
</body>
</html>
